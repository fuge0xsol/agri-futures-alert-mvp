    <path d="M256 126L303 155L256 176" stroke="#1F6B3A" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Subtle sun / data dot -->
    <circle cx="95" cy="92" r="26" fill="#F2B544"/>
    <circle cx="95" cy="92" r="42" stroke="#F2B544" stroke-width="8" opacity="0.18"/>
  </g>

  <g transform="translate(552 134)">
