<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">nongchan.us 农产品期货主力合约 Dashboard Logo</title>
  <desc id="desc">A clean agricultural futures logo combining a wheat leaf, rising market line, and the nongchan.us wordmark.</desc>
  <rect width="1600" height="520" rx="72" fill="#FFFFFF"/>

  <g transform="translate(118 82)">
    <rect x="0" y="0" width="356" height="356" rx="88" fill="#F6FAF4" stroke="#D9E8D1" stroke-width="8"/>

    <!-- Field curve -->
    <path d="M58 253C111 206 169 188 232 197C264 202 286 214 310 234" stroke="#D9A441" stroke-width="18" stroke-linecap="round"/>
    <path d="M58 295C111 248 169 230 232 239C264 244 286 256 310 276" stroke="#E8C679" stroke-width="14" stroke-linecap="round" opacity="0.75"/>

    <!-- Wheat stem -->
    <path d="M178 265C176 213 179 159 191 96" stroke="#2E7D32" stroke-width="18" stroke-linecap="round"/>

    <!-- Wheat grains / leaves -->
    <path d="M191 105C158 119 139 142 134 174C165 169 185 147 191 105Z" fill="#69A84F"/>
    <path d="M194 121C229 131 251 153 260 184C228 183 204 160 194 121Z" fill="#7FB85F"/>
