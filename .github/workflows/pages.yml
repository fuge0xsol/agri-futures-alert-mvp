name: Build and publish dashboard

on:
  workflow_dispatch:
  schedule:
    # 每小时更新一次网页；GitHub Actions 使用 UTC，实际触发可能有数分钟延迟
    - cron: '5 * * * *'
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync

      - name: Update data and build dashboard
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          uv run python scripts/update_fundamentals.py || true
          uv run python scripts/akshare_agri_mvp.py
          uv run python scripts/build_dashboard.py

      - name: Use committed docs on push
        if: github.event_name == 'push'
        run: |
          test -f docs/index.html
          test -f docs/dashboard.html
          test -f docs/research-ranking/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
